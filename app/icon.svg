<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#27272a"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="wave3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Sound wave bars - representing music/vibe -->
  <g transform="translate(256, 256)">
    <!-- Center bar (tallest) -->
    <rect x="-20" y="-120" width="40" height="240" rx="20" fill="url(#wave1)"/>

    <!-- Left bars -->
    <rect x="-80" y="-90" width="36" height="180" rx="18" fill="url(#wave2)"/>
    <rect x="-136" y="-60" width="32" height="120" rx="16" fill="url(#wave3)"/>

    <!-- Right bars -->
    <rect x="44" y="-90" width="36" height="180" rx="18" fill="url(#wave2)"/>
    <rect x="104" y="-60" width="32" height="120" rx="16" fill="url(#wave3)"/>
  </g>

  <!-- Subtle glow effect -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#wave1)" stroke-width="2" opacity="0.3"/>
</svg>